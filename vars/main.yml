---
###############################################################################
# Sonarr Role Options
###############################################################################
# Sonarr uses generic Servarr installation scripts.
#
# Updates:
# * Branch for new Debian releases.
# * KEEP a separate change log as changes are made.
# * Use bare-metal docs to validate package/process changes.
# * Update defaults.
# * Update tests for any changes.
# * Standard validation testing (yamllint, ansible-lint, to-do, no-qa).
#
# Reference:
# * https://github.com/Sonarr/Sonarr/blob/main/distribution/debian/install.sh
# * https://github.com/Sonarr/Sonarr/releases

sonarr___release: "{{ {} | r_pufky.data.v3(

    _date='2026-03-23',
    _debian='trixie',
    _app='v4.0.17.2952',
    _script_release='1.0.3',
    _script_date='2024-01-06',
  ) }}"

###############################################################################
# APT Packages
###############################################################################

sonarr___packages:
  - 'sqlite3'  # Sonarr DB.
  - 'gnupg2'  # GPG for certificates.
  - 'ca-certificates'  # Up to date certificates for certificate validation.
  - 'libicu76'  # International Unicode support for .NET.

  # Ansible.
  - 'xz-utils'  # xz archives.
  - 'rsync'  # ansible.posix.synchronize.

###############################################################################
# Sonarr GitHub Options
###############################################################################
# Reference:
# * https://github.com/Sonarr/Sonarr/releases/latest

sonarr___repo_url:
  'https://github.com/Sonarr/Sonarr/releases/download/'
sonarr___package:
  '{{ "Sonarr.main." ~ sonarr___release._app[1:] ~ ".linux-x64.tar.gz" }}'

sonarr___app: "{{ {} | r_pufky.data.v3(

    _version=sonarr___release._app,
    _package=sonarr___package,
    _var_dir='/var/opt/sonarr',
    _cfg='/var/opt/sonarr/config.xml',
    _opt_dir='/opt/sonarr',
    _src_dir='/opt/sonarr/src',
    _app='/opt/sonarr/src/' ~ sonarr___release._app,
    _service='/etc/systemd/system/sonarr.service',
    _base_url=sonarr___repo_url,
    _url=sonarr___repo_url ~ sonarr___release._app ~ '/' ~ sonarr___package,
  ) }}"

###############################################################################
# Default Sonarr User/Group
###############################################################################

sonarr___group:
  name: 'media'
  gid: 5555

sonarr___user:
  name: 'media'
  group: 'media'
  uid: 5555
  shell: '/usr/sbin/nologin'
  home: '/nonexistent'
  create_home: false
  password: '!'
  password_lock: true
  update_password: 'always'
  expires: -1
  system: true
