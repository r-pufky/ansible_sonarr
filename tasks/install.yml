---
###############################################################################
# Install
###############################################################################
# Install specified version from github release. Use custom service according
# to Linux FHS standards:
#
# Type    | Perms               | Path
# --------|---------------------|-------
# Runtime | 0750/0640 SRV:SRV   | /var/opt/sonarr
#
# Installation notes:
# * *arr expects all configuration data to reside in a single directory: DB's,
#   config, and metadata.
#     Resolution: Place all config data within /var/opt/sonarr.
#
# Reference:
# * https://github.com/Lidarr/Lidarr/tree/develop/distribution/debian

- name: 'Install | filesystem | set system directories'
  ansible.builtin.file:
    path: '{{ item }}'
    owner: 'root'
    group: 'root'
    mode: '0755'
    state: 'directory'
  loop:
    - '{{ sonarr___app._src_dir }}'

- name: 'Install | filesystem | set service directories'
  ansible.builtin.file:
    path: '{{ item }}'
    owner: '{{ sonarr__srv._user }}'
    group: '{{ sonarr__srv._group }}'
    mode: '0755'
    state: 'directory'
  loop:
    - '{{ sonarr___app._var_dir }}'

- name: 'Install | packages'
  ansible.builtin.include_role:
    name: 'r_pufky.deb.apt'
  vars:
    apt_packages:
      - '{{ sonarr___packages }}'
    apt_srv_package_update_cache: true

- name: 'Install | filesystem | find previous installations'
  ansible.builtin.find:
    paths: '{{ sonarr__cfg._src_dir }}'
    file_type: 'directory'
    recurse: false
    excludes:
      - '{{ sonarr__cfg._version }}'
  register: sonarr__cmd

- name: 'Install | filesystem | remove previous installations'
  ansible.builtin.file:
    path: '{{ item.path }}'
    state: 'absent'
  loop: '{{ sonarr__cmd.files }}'
  loop_control:
    label: '{{ item.path }}'

- name: 'Install | url | 🗘 Sonarr (~1 minute) 🗘'
  when: not (url_inject_enable | default(false))
  ansible.builtin.get_url:
    url: '{{ sonarr__cfg._url }}'
    dest: '{{ "/tmp/" ~ sonarr__cfg._package }}'
    force: false
    owner: 'root'
    group: 'root'
    mode: '0644'
    headers:
      Authorization: '{{ sonarr__srv._token | default(omit) }}'
  register: sonarr__cmd
  until: sonarr__cmd is succeeded

- name: '{{ "Install | filesystem | set " ~ sonarr__cfg._app }}'
  ansible.builtin.file:
    path: '{{ sonarr__cfg._app }}'
    owner: 'root'
    group: 'root'
    mode: '0755'
    state: 'directory'

- name: 'Install | filesystem | unpack Sonarr'
  ansible.builtin.unarchive:
    creates: '{{ sonarr__cfg._app ~ "/Sonarr" }}'
    src: '{{ "/tmp/" ~ sonarr__cfg._package }}'
    remote_src: true
    dest: '{{ sonarr__cfg._app }}'
    owner: 'root'
    group: 'root'
    mode: 'a-st'
    extra_opts: ['--strip-components=1']

- name: '{{ "Install | filesystem | set " ~ sonarr__cfg._service }}'
  ansible.builtin.template:
    src: 'systemd/sonarr.service.j2'
    dest: '{{ sonarr__cfg._service }}'
    owner: 'root'
    group: 'root'
    mode: '0644'
